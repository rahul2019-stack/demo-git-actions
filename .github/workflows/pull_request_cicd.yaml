name: CI-CD pipeline for pull request events

on:
  pull_request:
    branches:
      - master
      - feat/branch1

jobs:
  CI:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Run list all files command
        run: ls -la
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.8
      - name: Run test.py
        run: python test.py